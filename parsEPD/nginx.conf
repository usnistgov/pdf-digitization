load_module /usr/local/nginx/modules/ngx_http_headers_more_filter_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    types {
        text/javascript  js mjs;
        text/css         css;
        application/wasm wasm;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  3600;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;

    server_tokens off;
    more_clear_headers Server;

    server {
        listen       8080;
        listen  [::]:8080;
        server_name  localhost;

        #access_log  /var/log/nginx/host.access.log  main;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
            add_header 'Access-Control-Allow-Origin' 'https://parsepdtest.el.nist.gov';
            add_header 'Access-Control-Allow-Methods' 'GET';
            add_header 'Content-Security-Policy' "default-src https://*.nist.gov; script-src 'self' 'unsafe-eval' https://pages.nist.gov https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://pages.nist.gov; font-src 'self'; img-src 'self' data: https://pages.nist.gov; connect-src 'self' data: https://*.nist.gov; object-src 'none'; frame-ancestors 'none';";
            add_header 'Referrer-Policy' 'strict-origin-when-cross-origin';
            add_header 'X-Content-Type-Options' 'nosniff';
            add_header 'Strict-Transport-Security' 'max-age=86400; includeSubDomains; preload';
        }

        location /api/ {
            proxy_pass http://backend:5000/;
            proxy_http_version 1.1;

            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            send_timeout 300s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;

            add_header 'X-Content-Type-Options' 'nosniff';
            add_header 'Strict-Transport-Security' 'max-age=86400; includeSubDomains; preload';
            add_header 'Referrer-Policy' 'strict-origin-when-cross-origin';
        }
    }
}
